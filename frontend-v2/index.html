<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Daily OS" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- アイコン -->
    <link rel="icon" type="image/png" href="/icon-192.png" />

    <title>Daily OS</title>
  </head>
  <body>
    <!-- Clean OAuth hash before React loads so the token never appears in the URL -->
    <script>
      (function () {
        var h = location.hash
        if (h.includes('access_token=')) {
          var p = new URLSearchParams(h.slice(1))
          var t = p.get('access_token')
          var e = p.get('expires_in')
          if (t) {
            localStorage.setItem('google:cal:token', t)
            localStorage.setItem('google:cal:token_exp', String(Date.now() + Number(e || 3600) * 1000))
            history.replaceState(null, '', location.pathname + location.search)
          }
        }
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
