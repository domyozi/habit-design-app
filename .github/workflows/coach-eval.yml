name: Coach Eval (LLM-as-judge)

# coach prompt 関連の変更があった PR で、固定 fixture に対する応答品質を
# 自動で採点して PR コメントに投稿する。baseline からの低下 (> 0.3) は fail。
#
# 必要な GitHub Secrets:
#   - ANTHROPIC_API_KEY: judge & replay 用
#
# baseline 更新は main マージ後に手動で workflow_dispatch から走らせる。

on:
  pull_request:
    paths:
      - "backend/app/services/coach_prompts.py"
      - "backend/app/services/coach_eval.py"
      - "backend/app/services/coach_eval_replay.py"
      - "backend/scripts/run_coach_eval_replay.py"
      - "backend/tests/fixtures/coach_eval_pairs.json"
  workflow_dispatch:
    inputs:
      update_baseline:
        description: "main の現在 prompt で baseline を更新する"
        required: false
        default: "false"

jobs:
  eval:
    name: Run coach eval
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Run replay eval
        id: eval
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # SUPABASE_URL は空でも replay は動く (DB 不要)
          SUPABASE_URL: ""
          SUPABASE_SERVICE_ROLE_KEY: ""
        run: |
          set +e
          python scripts/run_coach_eval_replay.py \
            --fixture tests/fixtures/coach_eval_pairs.json \
            --label "pr-${{ github.event.pull_request.number }}" \
            --baseline tests/fixtures/coach_eval_baseline.json \
            --fail-threshold 0.3 \
            --out /tmp/eval-report.md \
            --json-out /tmp/eval-scores.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Read report
        if: always()
        id: report
        run: |
          if [ -f /tmp/eval-report.md ]; then
            {
              echo 'body<<EOF'
              cat /tmp/eval-report.md
              echo
              echo "---"
              echo "🤖 _coach-eval workflow · exit=${{ steps.eval.outputs.exit_code }}_"
              echo EOF
            } >> "$GITHUB_OUTPUT"
          else
            echo "body=(no report generated)" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coach-eval-${{ github.event.pull_request.number || 'manual' }}
          path: |
            /tmp/eval-report.md
            /tmp/eval-scores.json
          if-no-files-found: warn

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        env:
          REPORT_BODY: ${{ steps.report.outputs.body }}
        with:
          script: |
            const body = process.env.REPORT_BODY || '(empty report)';
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const marker = '<!-- coach-eval-report -->';
            const existing = comments.find(c => c.body && c.body.includes(marker));
            const newBody = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: newBody,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: newBody,
              });
            }

      - name: Fail if regression
        if: steps.eval.outputs.exit_code != '0'
        run: |
          echo "coach-eval reported regression. See PR comment for details."
          exit 1
