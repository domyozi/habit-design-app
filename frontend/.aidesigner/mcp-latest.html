<!--
aesthetic_dna: Premium Dark Mode, Atmospheric Glassmorphism, Typographic Tension (Japanese Modern Classicism)
ui_paradigm: Spatial Asymmetric Split-Screen (Brand Canvas left, Functional Glass UI right)
palette_choice: Deep Slate Base (#020617), Bioluminescent Emerald (#10b981) to Sky Blue (#0ea5e9) gradients, Translucent Whites.
-->
<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura · Align Your Future</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate_base: '#020617',
                        glass_fill: 'rgba(255, 255, 255, 0.08)',
                        glass_border: 'rgba(255, 255, 255, 0.12)',
                        glass_card: 'rgba(255, 255, 255, 0.03)',
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'Segoe UI', 'Avenir Next', 'sans-serif'],
                        serif: ['"Noto Serif JP"', 'serif'],
                    },
                    animation: {
                        'float-slow': 'float 20s ease-in-out infinite',
                        'float-delayed': 'float 24s ease-in-out infinite 2s',
                        'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0) scale(1)' },
                            '50%': { transform: 'translateY(-30px) scale(1.05)' },
                        },
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #020617;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 64px 64px;
            background-position: center center;
        }
        .fluid-headline {
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            line-height: 1.15;
            letter-spacing: -0.02em;
        }
        .neo-glass {
            background: linear-gradient(145deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 24px 64px -12px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #020617 inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
    </style>
</head>
<body class="text-slate-300 overflow-x-hidden min-h-screen relative selection:bg-emerald-500/30 selection:text-white flex flex-col">
    <!-- Atmospheric glows -->
    <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-emerald-500/10 blur-[120px] mix-blend-screen pointer-events-none animate-float-slow z-0"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-sky-500/10 blur-[140px] mix-blend-screen pointer-events-none animate-float-delayed z-0"></div>
    <div class="absolute top-[40%] left-[30%] w-[30vw] h-[30vw] rounded-full bg-indigo-500/5 blur-[100px] pointer-events-none z-0"></div>

    <!-- Header -->
    <header class="absolute top-0 w-full px-8 py-6 flex justify-between items-center z-50">
        <div class="flex items-center gap-2 text-white group cursor-pointer">
            <i class="ph-fill ph-infinity text-2xl text-emerald-400 transition-transform group-hover:rotate-90 duration-500"></i>
            <span class="font-bold tracking-widest text-sm uppercase mt-0.5">Habit Design</span>
        </div>
        <nav class="hidden md:flex gap-8 text-sm font-medium text-slate-400">
            <a href="#" class="hover:text-white transition-colors duration-200">About</a>
            <a href="#" class="hover:text-white transition-colors duration-200">Science</a>
            <a href="#" class="hover:text-white transition-colors duration-200">Pricing</a>
        </nav>
    </header>

    <!-- Main -->
    <main class="flex-grow grid grid-cols-1 lg:grid-cols-12 max-w-[1800px] w-full mx-auto z-10 px-6 lg:px-16 pt-24 pb-12 lg:py-0">
        <!-- Left: Brand canvas -->
        <section class="col-span-1 lg:col-span-7 flex flex-col justify-center items-start pr-0 lg:pr-20 mb-16 lg:mb-0">
            <div class="opacity-0 animate-fade-in-up w-full">
                <div class="flex items-center gap-3 mb-8">
                    <div class="h-[1px] w-8 bg-gradient-to-r from-emerald-400/50 to-transparent"></div>
                    <span class="text-xs font-bold tracking-[0.2em] uppercase text-emerald-400/80">AI-native habit system</span>
                </div>
                <h1 class="fluid-headline font-serif text-white mb-6 font-semibold">
                    <span class="block text-slate-100">未来の自分に、</span>
                    <span class="bg-gradient-to-r from-emerald-400 via-teal-300 to-sky-400 bg-clip-text text-transparent inline-block mt-2">今の習慣を合わせる。</span>
                </h1>
                <p class="text-lg lg:text-xl text-slate-400 font-light max-w-xl leading-relaxed mb-12">
                    AI と一緒に「なりたい自分」から逆算して習慣を組み立てるワークスペース。毎日戻りたくなる静かな高揚感を設計します。
                </p>
                <div class="flex flex-wrap gap-3">
                    <div class="flex items-center gap-2 px-4 py-2 rounded-full border border-white/12 bg-white/8 backdrop-blur-md text-sm text-slate-300 hover:bg-white/[0.12] transition-colors cursor-default">
                        <i class="ph-fill ph-focus text-emerald-400"></i>
                        <span>Clarity</span>
                    </div>
                    <div class="flex items-center gap-2 px-4 py-2 rounded-full border border-white/12 bg-white/8 backdrop-blur-md text-sm text-slate-300 hover:bg-white/[0.12] transition-colors cursor-default">
                        <i class="ph-fill ph-trend-up text-sky-400"></i>
                        <span>Momentum</span>
                    </div>
                    <div class="flex items-center gap-2 px-4 py-2 rounded-full border border-white/12 bg-white/8 backdrop-blur-md text-sm text-slate-300 hover:bg-white/[0.12] transition-colors cursor-default">
                        <i class="ph-fill ph-sparkle text-indigo-400"></i>
                        <span>Taste</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Right: Login card -->
        <section class="col-span-1 lg:col-span-5 flex items-center justify-center lg:justify-end relative">
            <div class="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent rounded-[2.5rem] transform scale-[0.98] blur-xl opacity-50 z-0"></div>
            <div class="neo-glass w-full max-w-[440px] rounded-[2rem] p-8 lg:p-10 relative z-10 opacity-0 animate-fade-in-up delay-300">
                <div class="mb-8">
                    <h2 class="text-2xl font-semibold text-white tracking-tight mb-2">ワークスペースへ</h2>
                    <p class="text-slate-400 text-sm">アカウントでサインインして始める</p>
                </div>
                <div class="flex flex-col gap-3 mb-6">
                    <button class="group relative flex items-center justify-center gap-3 w-full h-[48px] rounded-xl bg-white/8 border border-white/12 text-white font-medium text-sm transition-all duration-300 hover:bg-white/[0.12] hover:-translate-y-0.5 hover:shadow-[0_8px_20px_-8px_rgba(34,197,94,0.3)] active:translate-y-0 active:scale-[0.98]">
                        <svg class="h-5 w-5 shrink-0" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Google で始める
                    </button>
                    <button class="group flex items-center justify-center gap-3 w-full h-[48px] rounded-xl bg-white/8 border border-white/12 text-white font-medium text-sm transition-all duration-300 hover:bg-white/[0.12] hover:-translate-y-0.5 hover:shadow-[0_8px_20px_-8px_rgba(255,255,255,0.2)] active:translate-y-0 active:scale-[0.98]">
                        <svg class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
                        </svg>
                        Apple で始める
                    </button>
                </div>
                <p class="text-[11px] text-center text-slate-500 leading-relaxed">
                    続行することで
                    <a href="#" class="text-slate-300 hover:text-emerald-400 transition-colors underline underline-offset-2">利用規約</a> と
                    <a href="#" class="text-slate-300 hover:text-emerald-400 transition-colors underline underline-offset-2">プライバシーポリシー</a>
                    に同意したものとみなされます。
                </p>
            </div>
        </section>
    </main>
</body>
</html>
